name: Check Unreplied LINE Messages

on:
  schedule:
    # 毎時0分に実行（UTC）= 日本時間で毎時9時0分・10時0分・… のように正時
    - cron: '0 * * * *'
  # 手動実行も可能（テスト用）
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unreplied check
        run: python scripts/check_unreplied.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          ADMIN_NOTIFY_USER_IDS: ${{ secrets.ADMIN_NOTIFY_USER_IDS }}
          # 任意: 未返信とみなす時間数（デフォルト24）
          UNREPLIED_HOURS: ${{ vars.UNREPLIED_HOURS || '24' }}
          # 任意: 同じユーザーへの再通知間隔（デフォルト24時間）
          RE_NOTIFY_HOURS: ${{ vars.RE_NOTIFY_HOURS || '24' }}
