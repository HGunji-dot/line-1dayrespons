name: Check Unreplied LINE Messages

on:
  schedule:
    # GitHub Actions の cron は UTC。05:45 UTC = 日本時間 14:45（JST, UTC+9）
    # GitHub Actions の schedule は高負荷時に遅延するため :00 丁度を避け :45 にオフセット
    # → 典型的な 15 分前後の遅延を見込んで 15:00 JST 前後の到達を狙う
    # 月〜金のみトリガー（1-5）。祝日スキップは check_unreplied.py 側で処理
    - cron: '45 5 * * 1-5'
  # 手動実行も可能（テスト用）
  workflow_dispatch:
    inputs:
      force_report_test:
        description: 'テスト送信（日曜・祝日も実行。対象0件でも同じ体裁でLINEを送る）'
        required: false
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unreplied check
        run: python scripts/check_unreplied.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          ADMIN_NOTIFY_USER_IDS: ${{ secrets.ADMIN_NOTIFY_USER_IDS }}
          # 手動実行時のみ true（schedule では inputs が空になり false 相当）
          FORCE_REPORT_TEST: ${{ github.event.inputs.force_report_test || 'false' }}
          # 任意: 未返信とみなす時間数（デフォルト24）
          UNREPLIED_HOURS: ${{ vars.UNREPLIED_HOURS || '24' }}
          # 任意: 同じユーザーへの再通知間隔（デフォルト24時間）
          RE_NOTIFY_HOURS: ${{ vars.RE_NOTIFY_HOURS || '24' }}
